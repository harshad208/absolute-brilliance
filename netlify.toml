[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# ── Secrets scanning ──────────────────────────────────────────
# NEXT_PUBLIC_* variables are intentionally embedded in browser
# JavaScript by Next.js — this is by design, not a leak.
# We exclude them from scanning to prevent false positives.
# Ref: https://ntl.fyi/configure-secrets-scanning
[secrets_scanning]
  enabled = true
  omit_keys = [
    "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME",
    "NEXT_PUBLIC_WHATSAPP_NUMBER"
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"