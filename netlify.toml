[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # NEXT_PUBLIC_ vars appear in compiled HTML by design (Next.js inlines them).
  # Omit these keys from secrets scanning to prevent false positives.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME,NEXT_PUBLIC_WHATSAPP_NUMBER"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"